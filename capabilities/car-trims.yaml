naftiko: 1.0.0-alpha2
info:
  label: Car API — Trims
  description: 'Car API — Trims. 2 operations. Lead operation: Car API Search trims. Self-contained Naftiko capability covering
    one Car Api business surface.'
  tags:
  - Car Api
  - Trims
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    CAR_API_API_KEY: CAR_API_API_KEY
capability:
  consumes:
  - type: http
    namespace: car-trims
    baseUri: https://carapi.app
    description: Car API — Trims business capability. Self-contained, no shared references.
    resources:
    - name: api-trims
      path: /api/trims
      operations:
      - name: makemodeltrimsindexget
        method: GET
        description: Car API Search trims
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: sort
          in: query
          type: string
        - name: verbose
          in: query
          type: string
          description: Includes make, model and trim
        - name: year
          in: query
          type: string
        - name: make
          in: query
          type: string
        - name: model
          in: query
          type: string
        - name: trim
          in: query
          type: string
        - name: make_model_id
          in: query
          type: string
        - name: make_id
          in: query
          type: string
        - name: json
          in: query
          type: string
    - name: api-trims-id
      path: /api/trims/{id}
      operations:
      - name: makemodeltrimsviewget
        method: GET
        description: Car API Get vehicle data.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: integer
          required: true
    authentication:
      type: bearer
      token: '{{env.CAR_API_API_KEY}}'
  exposes:
  - type: rest
    namespace: car-trims-rest
    port: 8080
    description: REST adapter for Car API — Trims. One Spectral-compliant resource per consumed operation, prefixed with /v1.
    resources:
    - path: /v1/api/trims
      name: api-trims
      description: REST surface for api-trims.
      operations:
      - method: GET
        name: makemodeltrimsindexget
        description: Car API Search trims
        call: car-trims.makemodeltrimsindexget
        with:
          sort: rest.sort
          verbose: rest.verbose
          year: rest.year
          make: rest.make
          model: rest.model
          trim: rest.trim
          make_model_id: rest.make_model_id
          make_id: rest.make_id
          json: rest.json
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/api/trims/{id}
      name: api-trims-id
      description: REST surface for api-trims-id.
      operations:
      - method: GET
        name: makemodeltrimsviewget
        description: Car API Get vehicle data.
        call: car-trims.makemodeltrimsviewget
        with:
          id: rest.id
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: car-trims-mcp
    port: 9090
    transport: http
    description: MCP adapter for Car API — Trims. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: car-api-search-trims
      description: Car API Search trims
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: car-trims.makemodeltrimsindexget
      with:
        sort: tools.sort
        verbose: tools.verbose
        year: tools.year
        make: tools.make
        model: tools.model
        trim: tools.trim
        make_model_id: tools.make_model_id
        make_id: tools.make_id
        json: tools.json
      outputParameters:
      - type: object
        mapping: $.
    - name: car-api-get-vehicle-data
      description: Car API Get vehicle data.
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: car-trims.makemodeltrimsviewget
      with:
        id: tools.id
      outputParameters:
      - type: object
        mapping: $.
