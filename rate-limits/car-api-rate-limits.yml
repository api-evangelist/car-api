specification: API Commons Rate Limits
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/RateLimits
provider: Car API (carapi.app)
providerId: car-api
created: '2026-05-04'
modified: '2026-05-05'
reconciled: true
tags:
  - Automobiles
  - Automotive Data
  - Vehicle API
  - VIN Decoder
  - Rate Limiting
description: CarAPI enforces both per-day and per-minute rate limits scoped to the JWT token (per-account).
  Limits differ across plans and are signaled in the JWT payload via user.rate_limit_type ('soft' or
  'hard'). Hard limits reject requests with HTTP 429; soft limits allow overage with charges. Free public
  dataset is available without authentication for limited endpoints.
sources:
  - https://carapi.app/pricing
  - https://carapi.app/docs/getting-started
responseCodes:
  throttled: 429
  quotaExceeded: 429
limits:
  - name: Base plan daily quota
    scope: account
    metric: requests_per_day
    limit: 1500
    timeFrame: day
    notes: Base plan ($199/year). Per-minute cap also enforced.
  - name: Plus plan daily quota
    scope: account
    metric: requests_per_day
    limit: 3000
    timeFrame: day
    notes: Plus plan ($249/year). Per-minute cap also enforced.
  - name: Premium plan daily quota
    scope: account
    metric: requests_per_day
    limit: 6000
    timeFrame: day
    notes: Premium plan ($299/year). Per-minute cap also enforced.
  - name: Per-minute rate limit
    scope: account
    metric: requests_per_minute
    limit: see CarAPI docs
    notes: Per-minute cap is enforced on every plan; specific value varies by plan and is communicated
      in account dashboard.
policies:
  - name: JWT scoping
    description: Rate-limit tier ('soft' vs 'hard') is encoded in the JWT payload under user.rate_limit_type.
      Hard limits reject excess traffic with 429; soft limits permit overage and bill it.
  - name: JWT caching
    description: Tokens expire after 7 days. CarAPI recommends caching JWTs to avoid generating a new
      token per request, which itself counts against quotas.
  - name: Data caching
    description: CarAPI recommends caching frequently accessed data and using the 'modified' timestamp
      filter to refresh only changed records.
  - name: Quota reset
    description: Daily quota resets on a 24-hour rolling basis; per-minute window is sliding.
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
